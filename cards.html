        @import url("https://unpkg.com/open-props/open-props.min.css");
        @import url("https://unpkg.com/open-props/normalize.min.css");

        @font-face {
            font-family: "Geist Sans";
            src: url("https://assets.codepen.io/605876/GeistVF.ttf") format("truetype");
        }

        *,
        *:after,
        *:before {
            box-sizing: border-box;
        }

        :root {
            --card-size: 260px;
        }

        html {
            color-scheme: dark only;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            font-family: 'Geist Sans', sans-serif, system-ui;
            width: 100vw;
            overflow-x: hidden;
            font-weight: 80;
            background: #385697;
        }

        body::before {
            --size: 45px;
            --line: color-mix(in lch, canvasText, transparent 85%);
            content: '';
            height: 100vh;
            width: 100vw;
            position: fixed;
            background: linear-gradient(90deg,
                    var(--line) 1px,
                    transparent 1px var(--size)) 50% 50% / var(--size) var(--size),
                linear-gradient(var(--line) 1px, transparent 1px var(--size)) 50% 50% / var(--size) var(--size);
            mask: linear-gradient(-25deg, transparent 30%, white);
            top: 0;
            transform-style: flat;
            pointer-events: none;
        }

        ul {
            --width: 100vw;
            width: var(--width);
            height: 100vh;
            padding: 0;
            margin: 0;
            list-style-type: none;
            display: grid;
            place-items: center;
            grid-auto-flow: column;
            gap: 1rem;
            overflow: auto;
            scroll-snap-type: x mandatory;
            /* padding: 0 calc((var(--width, 80vw) * 0.5) - (var(--card-size, 300px) * 0.5)); */
        }

        li {
            scroll-snap-align: center;
        }

        article {
            width: var(--card-size, 300px);
            aspect-ratio: 3 / 4;
            background: var(--surface-4);
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-3);
            box-shadow:
                var(--shadow-5),
                0 1px inset white;
        }

        article::before {
            content: "";
            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 2;
            border-radius: var(--radius-3);
            border: 6px solid hsl(0 0% 100% / 0.1);
        }

        /* .backdrop { */
        article::after {
            content: "";
            z-index: -1;
            position: absolute;
            inset: 0;
            filter: grayscale(0.5);
            background-image: var(--bg);
            background-size: 200% 200%;
            background-position: 0% 50%;
        }

        .word {
            clip-path: inset(0 0 0 0);
        }

        span>span {
            display: inline-block;
        }

        a>span {
            background: hsl(0 0% 0% / 0.4);
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
        }

        span {
            font-size: 2.5rem;
            font-weight: 80;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: var(--gray-0);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        @supports (animation-timeline: scroll()) {
            @media (prefers-reduced-motion: no-preference) {
                span>span {
                    translate: 0 100%;
                    animation: move-on-up both ease-in-out;
                    animation-timeline: --item;
                    animation-range: cover 40% cover 60%;
                }

                article {
                    scale: 0.8;
                    filter: grayscale(1);
                    animation: colorify, scalify;
                    animation-fill-mode: both;
                    animation-timing-function: ease-in-out;
                    view-timeline: --item inline;
                    animation-timeline: view(inline);
                    animation-range: cover 40% cover 60%;
                }

                article::after {
                    animation: shift-bg both linear;
                    animation-timeline: --item;
                    animation-range: cover 40% cover 60%, contain;
                }

                @keyframes move-on-up {
                    0% {
                        translate: 0 100%;
                    }

                    50% {
                        translate: 0 0;
                    }

                    100% {
                        translate: 0 -100%;
                    }
                }

                @keyframes colorify {
                    50% {
                        filter: grayscale(0);
                    }
                }

                @keyframes scalify {
                    50% {
                        scale: 1;
                        background-position: 100% 100%;
                    }
                }

                @keyframes shift-bg {
                    0% {
                        background-position: 0% 50%;
                    }

                    100% {
                        background-position: 100% 50%;
                    }
                }
            }
        }


        .bear-link {
            color: canvasText;
            position: fixed;
            top: 1rem;
            left: 1rem;
            width: 48px;
            aspect-ratio: 1;
            display: grid;
            place-items: center;
            opacity: 0.8;
        }

        :where(.x-link, .bear-link):is(:hover, :focus-visible) {
            opacity: 1;
        }

        .bear-link svg {
            width: 75%;
            display: none;
        }
